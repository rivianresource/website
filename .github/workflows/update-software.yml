# .github/workflows/update-software.yml
# Runs weekly to regenerate /software/updates.json
# Also runs on manual trigger from the Actions tab

name: Update Software JSON

on:
  schedule:
    # Every Tuesday at 9am UTC (covers most Rivian release windows)
    - cron: '0 9 * * 2'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit the updated JSON

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate updates.json
        run: node scripts/fetch-updates.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet software/updates.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add software/updates.json
          git commit -m "chore: update software versions [automated]"
          git push
